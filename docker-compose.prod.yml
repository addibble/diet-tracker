services:
  backend:
    image: ghcr.io/addibble/diet-tracker-backend:latest
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/diet_tracker.db
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/addibble/diet-tracker-frontend:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
