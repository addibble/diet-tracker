services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/diet_tracker.db
    volumes:
      - db_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
